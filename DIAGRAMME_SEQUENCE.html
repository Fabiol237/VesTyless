    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D1117;
      font-family: 'Inter', sans-serif;
      color: #E6EDF3;
      overflow-x: auto;
    }
    header {
      text-align: center;
      padding: 30px 20px 18px;
      border-bottom: 1px solid #21262D;
      background: linear-gradient(180deg, #0D1117 0%, #161B22 100%);

      font-size: 1.85rem;
      font-weight: 700;
      background: linear-gradient(135deg, #58A6FF, #A78BFA, #F97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.04em;
    }
    header p { color: #8B949E; font-size: 0.88rem; margin-top: 6px; }
    .badge {
      display: inline-block;
      background: #161B22;
      border: 1px solid #30363D;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.75rem;
      color: #8B949E;
      margin-top: 10px;
      margin-right: 5px;
    }
    .canvas-wrap {
      padding: 30px 20px 60px;
      overflow-x: auto;
    }
    svg { display: block; margin: 0 auto; }

    /* GROUP BOX */
    .grp-box { rx: 6; ry: 6; }
  </style>
</head>
