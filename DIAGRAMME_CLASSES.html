<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VESTYLE — Diagramme de Classes UML</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D1117;
      font-family: 'Inter', sans-serif;
      color: #E6EDF3;
      min-height: 100vh;
      overflow-x: auto;
    }
    header {
      text-align: center;
      padding: 32px 20px 16px;
      border-bottom: 1px solid #21262D;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #F0C040, #E08A20);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.05em;
    }
    header p {
      color: #8B949E;
      font-size: 0.9rem;
      margin-top: 6px;
    }
    .badge {
      display: inline-block;
      background: #161B22;
      border: 1px solid #30363D;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.75rem;
      color: #8B949E;
      margin-top: 10px;
      margin-right: 6px;
    }
    .canvas-area {
      padding: 40px 30px 60px;
      position: relative;
    }
    svg#diagram {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      overflow: visible;
    }

    /* CLASS BOX */
    .cls-box { filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5)); }
    .cls-box rect.bg {
      rx: 8; ry: 8;
      fill: #161B22;
      stroke: #30363D;
      stroke-width: 1.5;
    }
    .cls-box rect.header { rx: 8; ry: 8; }
    .cls-box rect.header-mask { fill: #161B22; }
    .cls-title {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      fill: #FFFFFF;
      text-anchor: middle;
    }
    .cls-stereotype {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      fill: rgba(255,255,255,0.6);
      text-anchor: middle;
    }
    .attr-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      fill: #C9D1D9;
    }
    .attr-pk { fill: #F0C040; font-weight: 600; }
    .attr-fk { fill: #79C0FF; }
    .attr-method { fill: #7EE787; }
    .divider { stroke: #30363D; stroke-width: 1; }

    /* ARROWS */
    .rel-line { fill: none; stroke-width: 1.8; }
    .rel-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      fill: #8B949E;
      text-anchor: middle;
    }
    .rel-mult {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      fill: #58A6FF;
    }

    /* LEGEND */
    .legend { font-family: 'Inter', sans-serif; }

    /* TOOLTIP */
    .tooltip-trigger { cursor: pointer; }
  </style>
</head>
<body>
<header>
  <h1>⚡ VESTYLE — Diagramme de Classes UML</h1>
  <p>Architecture de la base de données & modèle objet complet</p>
  <br/>
  <span class="badge">📦 8 Classes</span>
  <span class="badge">🔗 9 Relations</span>
  <span class="badge">🗄️ Supabase / PostgreSQL</span>
  <span class="badge">🤖 IA Vectorielle</span>
</header>

<div class="canvas-area">
<svg id="diagram" width="1400" height="1050" viewBox="0 0 1400 1050" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for headers -->
    <linearGradient id="g-user" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#9333EA"/></linearGradient>
    <linearGradient id="g-profile" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2563EB"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient>
    <linearGradient id="g-store" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4338CA"/><stop offset="100%" stop-color="#6366F1"/></linearGradient>
    <linearGradient id="g-cat" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0D9488"/><stop offset="100%" stop-color="#14B8A6"/></linearGradient>
    <linearGradient id="g-prod" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#15803D"/><stop offset="100%" stop-color="#22C55E"/></linearGradient>
    <linearGradient id="g-order" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#C2410C"/><stop offset="100%" stop-color="#F97316"/></linearGradient>
    <linearGradient id="g-cart" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#92400E"/><stop offset="100%" stop-color="#EAB308"/></linearGradient>
    <linearGradient id="g-track" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#991B1B"/><stop offset="100%" stop-color="#EF4444"/></linearGradient>

    <!-- Arrow markers -->
    <marker id="arr-assoc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58A6FF" />
    </marker>
    <marker id="arr-compose" markerWidth="10" markerHeight="8" refX="1" refY="4" orient="auto">
      <polygon points="5 0, 10 4, 5 8, 0 4" fill="#F97316" />
    </marker>
    <marker id="arr-inherit" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <polygon points="0 0, 11 5, 0 10" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B949E" />
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════
       BACKGROUND GRID
  ═══════════════════════════════════════════════ -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161B22" stroke-width="0.5"/>
  </pattern>
  <rect width="1400" height="1050" fill="url(#grid)"/>

  <!-- ═══════════════════════════════════════════════
       CLASS: auth.users (User)
       Position: x=30, y=60
  ═══════════════════════════════════════════════ -->
  <g class="cls-box" transform="translate(30, 60)">
    <rect class="bg" width="230" height="160" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="230" height="38" rx="8" fill="url(#g-user)"/>
    <rect y="20" width="230" height="18" fill="url(#g-user)"/>
    <text class="cls-stereotype" x="115" y="14">«entity»</text>
    <text class="cls-title" x="115" y="30">auth.users</text>
    <!-- Divider -->
    <line x1="0" y1="38" x2="230" y2="38" class="divider"/>
    <!-- Attributes -->
    <text class="attr-text attr-pk" x="12" y="56">🔑 id : UUID [PK]</text>
    <text class="attr-text" x="12" y="73">📧 email : String</text>
    <text class="attr-text" x="12" y="90">🔒 password_hash : String</text>
    <text class="attr-text" x="12" y="107">📋 raw_meta_data : JSONB</text>
    <text class="attr-text" x="12" y="124">📅 created_at : Timestamp</text>
    <!-- Divider -->
    <line x1="0" y1="134" x2="230" y2="134" class="divider"/>
    <!-- Methods -->
    <text class="attr-text attr-method" x="12" y="149">+ signIn() / signOut()</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       CLASS: Profile
       Position: x=300, y=60
  ═══════════════════════════════════════════════ -->
  <g class="cls-box" transform="translate(300, 60)">
    <rect class="bg" width="240" height="185" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <rect width="240" height="38" rx="8" fill="url(#g-profile)"/>
    <rect y="20" width="240" height="18" fill="url(#g-profile)"/>
    <text class="cls-stereotype" x="120" y="14">«entity»</text>
    <text class="cls-title" x="120" y="30">Profile</text>
    <line x1="0" y1="38" x2="240" y2="38" class="divider"/>
    <text class="attr-text attr-pk" x="12" y="56">🔑 id : UUID [PK, FK→User]</text>
    <text class="attr-text" x="12" y="73">📧 email : String [UNIQUE]</text>
    <text class="attr-text" x="12" y="90">👤 full_name : String</text>
    <text class="attr-text" x="12" y="107">🖼️ avatar_url : String</text>
    <text class="attr-text" x="12" y="124">📅 created_at : Timestamp</text>
    <text class="attr-text" x="12" y="141">🔄 updated_at : Timestamp</text>
    <line x1="0" y1="151" x2="240" y2="151" class="divider"/>
    <text class="attr-text attr-method" x="12" y="167">+ updateProfile(data)</text>
    <text class="attr-text attr-method" x="12" y="183">+ getAvatar() : String</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       CLASS: Store
       Position: x=590, y=30
  ═══════════════════════════════════════════════ -->
  <g class="cls-box" transform="translate(590, 30)">
    <rect class="bg" width="260" height="370" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <rect width="260" height="38" rx="8" fill="url(#g-store)"/>
    <rect y="20" width="260" height="18" fill="url(#g-store)"/>
    <text class="cls-stereotype" x="130" y="14">«entity»</text>
    <text class="cls-title" x="130" y="30">Store</text>
    <line x1="0" y1="38" x2="260" y2="38" class="divider"/>
    <text class="attr-text attr-pk" x="12" y="56">🔑 id : UUID [PK]</text>
    <text class="attr-text attr-fk" x="12" y="73">🔗 owner_id : UUID [FK→Profile]</text>
    <text class="attr-text" x="12" y="90">🏪 name : String</text>
    <text class="attr-text" x="12" y="107">🔗 slug : String [UNIQUE]</text>
    <text class="attr-text" x="12" y="124">📝 description : Text</text>
    <text class="attr-text" x="12" y="141">🖼️ logo_url : String</text>
    <text class="attr-text" x="12" y="158">🏷️ banner_url : String</text>
    <text class="attr-text" x="12" y="175">🎨 theme_color : String</text>
    <text class="attr-text" x="12" y="192">🎨 secondary_color : String</text>
    <text class="attr-text attr-pk" x="12" y="209">🔢 store_code : VARCHAR(5) [U]</text>
    <text class="attr-text" x="12" y="226">🏙️ city : String</text>
    <text class="attr-text" x="12" y="243">📞 phone : String</text>
    <text class="attr-text" x="12" y="260">✏️ font_family : String</text>
    <text class="attr-text" x="12" y="277">✅ is_active : Boolean</text>
    <text class="attr-text" x="12" y="294">⭐ is_boosted : Boolean</text>
    <text class="attr-text" x="12" y="311">👁️ daily_views : Integer</text>
    <text class="attr-text" x="12" y="328">📍 latitude / longitude : Numeric</text>
    <line x1="0" y1="336" x2="260" y2="336" class="divider"/>
    <text class="attr-text attr-method" x="12" y="352">+ generateStoreCode()</text>
    <text class="attr-text attr-method" x="12" y="368">+ updateTheme(color)</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       CLASS: Category
       Position: x=900, y=60
  ═══════════════════════════════════════════════ -->
  <g class="cls-box" transform="translate(900, 60)">
    <rect class="bg" width="230" height="190" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <rect width="230" height="38" rx="8" fill="url(#g-cat)"/>
    <rect y="20" width="230" height="18" fill="url(#g-cat)"/>
    <text class="cls-stereotype" x="115" y="14">«entity»</text>
    <text class="cls-title" x="115" y="30">Category</text>
    <line x1="0" y1="38" x2="230" y2="38" class="divider"/>
    <text class="attr-text attr-pk" x="12" y="56">🔑 id : UUID [PK]</text>
    <text class="attr-text attr-fk" x="12" y="73">🔗 store_id : UUID [FK→Store]</text>
    <text class="attr-text" x="12" y="90">📂 name : String</text>
    <text class="attr-text" x="12" y="107">🔗 slug : String</text>
    <text class="attr-text" x="12" y="124">📅 created_at : Timestamp</text>
    <text class="attr-text" style="font-size:9.5px; fill:#8B949E" x="12" y="141">UNIQUE(store_id, slug)</text>
    <line x1="0" y1="151" x2="230" y2="151" class="divider"/>
    <text class="attr-text attr-method" x="12" y="167">+ getProducts() : Product[]</text>
    <text class="attr-text attr-method" x="12" y="184">+ updateSlug(name)</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       CLASS: Product
       Position: x=1140, y=40
  ═══════════════════════════════════════════════ -->
  <g class="cls-box" transform="translate(1140, 40)">
    <rect class="bg" width="240" height="330" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <rect width="240" height="38" rx="8" fill="url(#g-prod)"/>
    <rect y="20" width="240" height="18" fill="url(#g-prod)"/>
    <text class="cls-stereotype" x="120" y="14">«entity»</text>
    <text class="cls-title" x="120" y="30">Product</text>
    <line x1="0" y1="38" x2="240" y2="38" class="divider"/>
    <text class="attr-text attr-pk" x="12" y="56">🔑 id : UUID [PK]</text>
    <text class="attr-text attr-fk" x="12" y="73">🔗 store_id : UUID [FK→Store]</text>
    <text class="attr-text attr-fk" x="12" y="90">🔗 category_id : UUID [FK→Cat]</text>
    <text class="attr-text" x="12" y="107">📦 name : String</text>
    <text class="attr-text" x="12" y="124">📝 description : Text</text>
    <text class="attr-text" x="12" y="141">💰 price : Decimal(12,2)</text>
    <text class="attr-text" x="12" y="158">🖼️ image_url : String</text>
    <text class="attr-text" x="12" y="175">📊 stock_quantity : Integer</text>
    <text class="attr-text" x="12" y="192">✅ is_active : Boolean</text>
    <text class="attr-text" x="12" y="209" style="fill:#A78BFA">🤖 embedding : Vector(1024)</text>
    <text class="attr-text" x="12" y="226">🔍 image_embedding : Vector</text>
    <text class="attr-text" x="12" y="243">📅 created_at : Timestamp</text>
    <text class="attr-text" x="12" y="260">🔄 updated_at : Timestamp</text>
    <line x1="0" y1="270" x2="240" y2="270" class="divider"/>
    <text class="attr-text attr-method" x="12" y="286">+ generateEmbedding()</text>
    <text class="attr-text attr-method" x="12" y="302">+ visualSearch(image)</text>
    <text class="attr-text attr-method" x="12" y="318">+ updateStock(qty)</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       CLASS: Order
       Position: x=560, y=480
  ═══════════════════════════════════════════════ -->
  <g class="cls-box" transform="translate(560, 480)">
    <rect class="bg" width="280" height="320" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <rect width="280" height="38" rx="8" fill="url(#g-order)"/>
    <rect y="20" width="280" height="18" fill="url(#g-order)"/>
    <text class="cls-stereotype" x="140" y="14">«entity»</text>
    <text class="cls-title" x="140" y="30">Order</text>
    <line x1="0" y1="38" x2="280" y2="38" class="divider"/>
    <text class="attr-text attr-pk" x="12" y="56">🔑 id : UUID [PK]</text>
    <text class="attr-text attr-fk" x="12" y="73">🔗 store_id : UUID [FK→Store]</text>
    <text class="attr-text" x="12" y="90">👤 customer_name : String</text>
    <text class="attr-text" x="12" y="107">📧 customer_email : String</text>
    <text class="attr-text" x="12" y="124">📞 customer_phone : String</text>
    <text class="attr-text" x="12" y="141">💵 total_amount : Decimal(12,2)</text>
    <text class="attr-text" x="12" y="158">📋 order_items : JSONB</text>
    <text class="attr-text" x="12" y="175" style="fill:#FCD34D">⚡ status : Enum</text>
    <text class="attr-text" style="font-size:9px; fill:#8B949E" x="22" y="190">  pending|processing|shipped</text>
    <text class="attr-text" style="font-size:9px; fill:#8B949E" x="22" y="203">  delivered|cancelled</text>
    <text class="attr-text" x="12" y="218">📍 delivery_lat : Decimal(9,6)</text>
    <text class="attr-text" x="12" y="235">📍 delivery_lng : Decimal(9,6)</text>
    <text class="attr-text attr-fk" x="12" y="252">🔗 delivery_agent_id : UUID [FK]</text>
    <text class="attr-text" x="12" y="269">📅 created_at : Timestamp</text>
    <line x1="0" y1="279" x2="280" y2="279" class="divider"/>
    <text class="attr-text attr-method" x="12" y="295">+ updateStatus(status)</text>
    <text class="attr-text attr-method" x="12" y="311">+ assignDelivery(agentId)</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       CLASS: CartItem
       Position: x=120, y=500
  ═══════════════════════════════════════════════ -->
  <g class="cls-box" transform="translate(120, 500)">
    <rect class="bg" width="240" height="210" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <rect width="240" height="38" rx="8" fill="url(#g-cart)"/>
    <rect y="20" width="240" height="18" fill="url(#g-cart)"/>
    <text class="cls-stereotype" x="120" y="14">«entity»</text>
    <text class="cls-title" x="120" y="30">CartItem</text>
    <line x1="0" y1="38" x2="240" y2="38" class="divider"/>
    <text class="attr-text attr-pk" x="12" y="56">🔑 id : UUID [PK]</text>
    <text class="attr-text attr-fk" x="12" y="73">🔗 user_id : UUID [FK→User]</text>
    <text class="attr-text attr-fk" x="12" y="90">🔗 product_id : UUID [FK→Product]</text>
    <text class="attr-text" x="12" y="107">🔢 quantity : Integer</text>
    <text class="attr-text" x="12" y="124">📅 created_at : Timestamp</text>
    <text class="attr-text" style="font-size:9px; fill:#8B949E" x="12" y="141">UNIQUE(user_id, product_id)</text>
    <line x1="0" y1="151" x2="240" y2="151" class="divider"/>
    <text class="attr-text attr-method" x="12" y="168">+ addToCart(product, qty)</text>
    <text class="attr-text attr-method" x="12" y="185">+ removeFromCart(id)</text>
    <text class="attr-text attr-method" x="12" y="202">+ updateQuantity(id, qty)</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       CLASS: DeliveryTracking
       Position: x=900, y=500
  ═══════════════════════════════════════════════ -->
  <g class="cls-box" transform="translate(900, 500)">
    <rect class="bg" width="250" height="210" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1.5"/>
    <rect width="250" height="38" rx="8" fill="url(#g-track)"/>
    <rect y="20" width="250" height="18" fill="url(#g-track)"/>
    <text class="cls-stereotype" x="125" y="14">«entity»</text>
    <text class="cls-title" x="125" y="30">DeliveryTracking</text>
    <line x1="0" y1="38" x2="250" y2="38" class="divider"/>
    <text class="attr-text attr-pk" x="12" y="56">🔑 id : UUID [PK]</text>
    <text class="attr-text attr-fk" x="12" y="73">🔗 order_id : UUID [FK→Order]</text>
    <text class="attr-text" x="12" y="90">📍 lat : Decimal(9,6)</text>
    <text class="attr-text" x="12" y="107">📍 lng : Decimal(9,6)</text>
    <text class="attr-text" x="12" y="124">🔄 updated_at : Timestamp</text>
    <text class="attr-text" style="font-size:9.5px; fill:#A78BFA" x="12" y="141">📡 Realtime: supabase_realtime</text>
    <line x1="0" y1="151" x2="250" y2="151" class="divider"/>
    <text class="attr-text attr-method" x="12" y="168">+ updatePosition(lat, lng)</text>
    <text class="attr-text attr-method" x="12" y="185">+ getRoute() : Polyline</text>
    <text class="attr-text attr-method" x="12" y="202">+ subscribe() : Realtime</text>
  </g>

  <!-- ═══════════════════════════════════════════════
       RELATIONSHIPS / ARROWS
  ═══════════════════════════════════════════════ -->

  <!-- 1. User → Profile (1:1 inheritance/extension) -->
  <line x1="260" y1="130" x2="300" y2="130" stroke="#9333EA" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-inherit)"/>
  <text class="rel-mult" x="270" y="122">1</text>
  <text class="rel-mult" x="290" y="122">1</text>
  <text class="rel-label" x="280" y="145">«extends»</text>

  <!-- 2. Profile → Store (1:N) -->
  <line x1="540" y1="130" x2="590" y2="160" stroke="#58A6FF" stroke-width="1.8" marker-end="url(#arr-assoc)"/>
  <text class="rel-mult" x="547" y="122">1</text>
  <text class="rel-mult" x="580" y="148">0..*</text>
  <text class="rel-label" x="565" y="137">owns</text>

  <!-- 3. Store → Category (1:N) -->
  <line x1="850" y1="200" x2="900" y2="150" stroke="#14B8A6" stroke-width="1.8" marker-end="url(#arr-assoc)"/>
